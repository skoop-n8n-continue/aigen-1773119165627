<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Slides</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --primary: #00b7af;
            --dark: #10181f;
            --light: #ffffff;
            --secondary: #6a7071;
            --bg-color: var(--dark);
            --text-color: var(--light);
            --slide-duration: 4000ms; /* Total time per slide */
            --transition-speed: 800ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateX(100%);
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                        opacity var(--transition-speed) ease;
            padding: 2rem;
            text-align: center;
        }

        .slide h1 {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        /* Animation States */
        .slide.active {
            opacity: 1;
            transform: translateX(0);
        }

        .slide.exit {
            opacity: 0;
            transform: translateX(-100%);
        }

        @media (max-width: 768px) {
            .slide h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="slide1" class="slide">
            <h1>Hello World</h1>
        </div>
        <div id="slide2" class="slide">
            <h1>I'm here!</h1>
        </div>
    </div>

    <script>
        const slides = [
            document.getElementById('slide1'),
            document.getElementById('slide2')
        ];

        let currentSlideIndex = 0;
        const SLIDE_TIME = 3000; // Visible time
        const TRANSITION_TIME = 800; // Match CSS transition

        function showNextSlide() {
            const currentSlide = slides[currentSlideIndex];

            // 1. Slide In
            currentSlide.classList.remove('exit');
            currentSlide.classList.add('active');

            // 2. Wait for visible duration, then Slide Out
            setTimeout(() => {
                currentSlide.classList.remove('active');
                currentSlide.classList.add('exit');

                // 3. Prepare next slide
                currentSlideIndex = (currentSlideIndex + 1) % slides.length;

                // Wait for exit transition to finish before showing next
                setTimeout(showNextSlide, TRANSITION_TIME);
            }, SLIDE_TIME);
        }

        // Start the sequence
        window.onload = () => {
            // Short delay to ensure rendering before first slide in
            setTimeout(showNextSlide, 500);
        };
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
